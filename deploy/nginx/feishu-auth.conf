# Feishu fallback OAuth callback (ADR-0008). Proxies the box's Bun auth server,
# which serves GET /feishu/oauth/start (302 -> Feishu authorize) and
# GET /feishu/oauth/callback (v2 token exchange -> Office messageParent). Same
# include pattern as sentry-tunnel.conf — add to the wmdev server block:
#   include snippets/feishu-auth.conf;
# The path is preserved (proxy_pass has no URI part), so the Bun `routes` match.
# Keep the port in sync with FEISHU_AUTH_PORT (default 8788).
location /feishu/oauth/ {
    proxy_pass http://127.0.0.1:8788;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
}

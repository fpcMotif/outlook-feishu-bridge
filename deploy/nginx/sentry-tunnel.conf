# Sentry tunnel (ADR-0007 / observability). The SPA's Sentry SDK posts envelopes
# to same-origin /_sentry/ instead of *.ingest.sentry.io directly. This box sits
# IN mainland China (Aliyun), so the client->box hop is in-region/fast and the
# box->Sentry(US) hop is server-side — making telemetry reach Sentry from CN
# users, not only from outside-China testing. Same-origin also means no
# third-party connect-src is needed.
#
# Single project, so the upstream envelope endpoint is fixed (DSN project id).
# Included into the wmdev.zeuja.com server block.
# Resolve the Sentry host LAZILY (at request time), never at config-load.
# A bare hostname in proxy_pass is resolved once, when nginx parses the config, and
# a failure there is FATAL: `[emerg] host not found in upstream`. On 2026-06-12 the
# daily unattended-upgrade bounced nginx while systemd-resolved was momentarily down,
# this lookup failed, and the WHOLE box (the /addin/ SPA included) stayed down 3 days.
# Putting the host in a $variable + giving nginx an explicit `resolver` defers the
# lookup to request time, so nginx always starts; only /_sentry/ telemetry degrades
# if Sentry DNS is briefly unreachable. resolver targets: Aliyun VPC DNS first
# (independent of the local 127.0.0.53 stub that died), public AliDNS as backstop.
location = /_sentry/ {
    resolver 100.100.2.136 100.100.2.138 223.5.5.5 valid=300s ipv6=off;
    resolver_timeout 5s;
    set $sentry_ingest "o4511431447478272.ingest.us.sentry.io";
    # NOTE: with a variable in proxy_pass, nginx does NOT append the matched URI —
    # the full /api/.../envelope/ path must stay spelled out here.
    proxy_pass https://$sentry_ingest/api/4511431758839808/envelope/;
    proxy_ssl_server_name on;
    proxy_ssl_name o4511431447478272.ingest.us.sentry.io;
    proxy_set_header Host o4511431447478272.ingest.us.sentry.io;
    proxy_set_header X-Forwarded-For $remote_addr;
}

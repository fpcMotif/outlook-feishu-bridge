# Reference nginx server for the ECS Host. Replace __ADDIN_DOMAIN__ with the real
# host. Install at /etc/nginx/sites-available/<host> + symlink into sites-enabled,
# and put the four included snippets — addin-headers, addin-assets-cache,
# feishu-auth, sentry-tunnel — at /etc/nginx/snippets/. scripts/provision-ecs.sh
# does all of this (render + symlink + snippets + gzip) on a fresh box.
#
# Run `certbot --nginx -d __ADDIN_DOMAIN__` AFTER this is in place; certbot adds
# the `listen 443 ssl` block, the cert paths, and the http->https redirect.
server {
    listen 80;
    listen [::]:80;
    server_name __ADDIN_DOMAIN__;

    location = / { return 302 /addin/; }
    location = /addin { return 301 /addin/; }

    location /addin/ {
        alias /var/www/addin/;
        try_files $uri $uri/ /addin/index.html;
        include snippets/addin-headers.conf;
    }

    # index.html must never be cached, or Outlook keeps a stale bundle after a deploy.
    location = /addin/index.html {
        alias /var/www/addin/index.html;
        include snippets/addin-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Hashed assets are immutable by name → cache forever (more specific prefix than
    # /addin/, so it wins for /addin/assets/*).
    include snippets/addin-assets-cache.conf;
    # Fallback Feishu OAuth callback (ADR-0008) — proxied to the local Bun server.
    include snippets/feishu-auth.conf;
    # Same-origin Sentry tunnel (ADR-0007) — proxied to *.ingest.sentry.io.
    include snippets/sentry-tunnel.conf;
}

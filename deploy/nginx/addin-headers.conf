# Response headers for the SPA, included into the /addin/ location.
# frame-ancestors is load-bearing: it must list EVERY Office host domain that
# frames the taskpane, or the browser refuses to load the add-in. The new
# Outlook runs on *.cloud.microsoft (not *.office.com), so it MUST be included.
# connect-src must reach Convex (incl. websocket) + Feishu. img-src is `https:`
# so the SPA can render arbitrary email images for PDF generation.
# script-src must include https://ajax.aspnetcdn.com AND 'unsafe-eval': Office.js's
# Outlook host bundle (outlook-web-16.01.js) fetches MicrosoftAjax.js from that CDN
# during init, and MicrosoftAjax uses eval() — without 'unsafe-eval' the browser
# throws "CSP blocked script-src: eval" and MicrosoftAjax half-initializes
# (TypeError reading 'cannotDeserializeInvalidJson'). Blocking the CDN entirely
# kills the taskpane with "couldn't start this add-in".
# Originally lived in public/_headers (Cloudflare); see ADR-0002.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://appsforoffice.microsoft.com https://*.oaspapps.com https://ajax.aspnetcdn.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.convex.cloud https://*.convex.site wss://*.convex.cloud https://open.feishu.cn https://*.microsoft.com https://*.office.com https://*.office365.com https://*.cloud.microsoft https://*.oaspapps.com https://*.sentry.io; img-src 'self' https: data: blob:; frame-src 'self' https://*.oaspapps.com https://*.microsoft.com https://*.office.com https://*.office365.com https://*.outlook.com https://*.cloud.microsoft https://*.microsoft365.com; frame-ancestors https://*.microsoft.com https://*.office.com https://*.office365.com https://*.outlook.com https://*.cloud.microsoft https://*.microsoft365.com;" always;
add_header X-Content-Type-Options "nosniff" always;
# NOTE: SPA cache-busting lives in the server block, not here: a dedicated
# `location = /addin/index.html` adds `Cache-Control: no-cache` so the Outlook
# WebView revalidates index.html and picks up each deploy's new hashed assets.
# Hashed assets under /addin/assets/ are immutable by name and may be cached.
# (Office's own WebView/Wef cache can still hold a stale copy across a redeploy;
# that is cleared add-in-side, not via these headers.)

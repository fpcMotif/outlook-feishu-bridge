# Content-hashed Vite assets are immutable by name (a new build = a new filename),
# so they can be cached forever — this makes re-opening the add-in skip the
# bundle download entirely (only index.html, which is no-cache, revalidates).
# `include snippets/addin-assets-cache.conf;` into the wmdev server block, AND
# enable gzip for JS/CSS in nginx.conf (uncomment the `gzip_types …
# application/javascript …` line) — without it nginx ships the JS uncompressed.
location /addin/assets/ {
    alias /var/www/addin/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}
